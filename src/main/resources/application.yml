spring:
  application:
    name: angogas-backend
  profiles:
    include: local

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/angogas}
    username: ${DB_USER:angogas}
    password: ${DB_PASSWORD:angogas123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 7
    validate-on-migrate: false

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

jwt:
  secret: ${JWT_SECRET:5A7134743777217A25432A462D4A614E645267556B5870327335753878214125}
  access-expiration: ${JWT_ACCESS_EXPIRY:900}
  refresh-expiration: ${JWT_REFRESH_EXPIRY:2592000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  info:
    title: AngoGÁS API
    description: API de entrega de botijões de gás porta a porta — Angola
    version: 1.0.0

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

cloudinary:
  url: ${CLOUDINARY_URL:}

fcm:
  enabled: ${FCM_ENABLED:false}
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    root: INFO
    ao.angogas: DEBUG
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
    org.springframework.data.repository.config.RepositoryConfigurationExtensionSupport: WARN
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
